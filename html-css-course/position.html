<!DOCTYPE html>
<html>
  <head>
    <title>Position Practice</title>
  </head>
  <body style="
  height: 3000px;
  padding-top: 60px;
  padding-left:80px;
  ">

      background-color: black;

    <div style="
    background-color: brown;

    width: 70px;
    ">
      sidebar
      <div style="
      position: absolute;
      background-color: blue;
      color: white;
      top:0px;

    </div>

    <div style="
    position: absolute;

    color: white;

    absolute
  </div>

    <div style="
      background-color: lightblue; 
      height: 200px;

      div 2</div>
